# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
# Note: In cargo-deny v0.14+, these fields changed to arrays of strings
ignore = [
    # lru 0.12.5 IterMut unsound issue - not security critical for TUI usage
    # ratatui depends on this, waiting for upstream fix
    "RUSTSEC-2026-0002",
    
    # Ring vulnerabilities - from ldap3 and other transitive deps
    # These are for AES overflow checking panics, not exploitable in our usage
    "RUSTSEC-2025-0009",  # ring AES panic
    "RUSTSEC-2025-0010",  # ring unmaintained (0.16.x)
    
    # rustls-webpki CRL matching issue - not security critical
    # We don't rely on CRL revocation checking
    "RUSTSEC-2026-0049",
    
    # wasmtime vulnerabilities - from ember-plugins WASM support
    # These require malicious WASM modules, we only load trusted plugins
    "RUSTSEC-2026-0020",  # WASI resource exhaustion
    "RUSTSEC-2026-0006",  # f64.copysign x86-64 issue
    "RUSTSEC-2026-0021",  # wasi:http fields panic
    "RUSTSEC-2025-0118",  # shared memory unsound
    "RUSTSEC-2025-0046",  # fd_renumber panic
    
    # Unmaintained GTK3 bindings - from Tauri desktop app
    # These are Linux-only and Tauri upstream depends on them
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0411",  # gdkwayland-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0414",  # gdkx11-sys
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0420",  # gtk-sys
    "RUSTSEC-2024-0419",  # gtk3-macros
    
    # Other unmaintained crates from transitive deps
    "RUSTSEC-2025-0141",  # bincode - from syntect
    "RUSTSEC-2025-0057",  # fxhash - from selectors/wasmtime
    "RUSTSEC-2024-0436",  # paste - from wasmtime/ratatui
    "RUSTSEC-2024-0370",  # proc-macro-error - from gtk/tabled
    "RUSTSEC-2025-0134",  # rustls-pemfile - from ldap3/reqwest
    "RUSTSEC-2024-0320",  # yaml-rust - from syntect
    
    # unic-* unmaintained - from urlpattern/tauri
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0100",  # unic-ucd-ident
    "RUSTSEC-2025-0098",  # unic-ucd-version
    
    # glib unsound VariantStrIter - from GTK bindings
    # We don't use this API directly
    "RUSTSEC-2024-0429",
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD",
]
copyleft = "warn"
confidence-threshold = 0.8

# Clarify licenses for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Skip certain crates from duplicate detection
skip = [
    # Common crates with multiple versions
]

# Deny specific crates
deny = [
    # Example: { name = "openssl" }
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
# Allow crates from specific GitHub organizations
github = []