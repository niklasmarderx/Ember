# =============================================================================
# Ember Benchmark CI Workflow
# =============================================================================
#
# Runs performance benchmarks using Criterion via ember-llm's bench targets.
# The dedicated ember-benchmarks crate was removed in the workspace cleanup;
# benchmarks now live as standard Criterion benches in individual crates.
#
# =============================================================================

name: Benchmarks

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libglib2.0-dev libgtk-3-dev libasound2-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build workspace (release)
        run: cargo build --release --workspace --exclude ember-desktop

      - name: Run available benchmarks
        run: |
          echo "📊 Running available Criterion benchmarks..."
          # Run benches from crates that have them
          for crate_dir in crates/*/; do
            crate_name=$(basename "$crate_dir")
            if ls "$crate_dir"/benches/*.rs 1>/dev/null 2>&1; then
              echo "  → Running benches for $crate_name"
              cargo bench -p "$crate_name" -- --warm-up-time 1 --measurement-time 3 2>&1 || true
            fi
          done
          echo "✅ Benchmarks complete"

      - name: Generate benchmark summary
        run: |
          echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
