# Default values for Ember Helm Chart

# Global settings
global:
  imageRegistry: ghcr.io/ember-ai

# API Server configuration
api:
  replicaCount: 3
  image:
    repository: ember
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  service:
    type: ClusterIP
    port: 80
    wsPort: 8081
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# Web Frontend configuration
web:
  enabled: true
  replicaCount: 2
  image:
    repository: ember-web
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  service:
    type: ClusterIP
    port: 80

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: ember.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
    - host: api.ember.example.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls:
    - secretName: ember-tls
      hosts:
        - ember.example.com
        - api.ember.example.com

# Ember configuration
config:
  defaultModel: gpt-4
  defaultProvider: openai
  logLevel: info
  telemetryEnabled: false
  maxTokens: 4096
  temperature: 0.7
  corsOrigins: "*"
  rateLimitRequests: 100
  rateLimitWindow: 60
  tools:
    enabled:
      - shell
      - filesystem
      - web
      - browser
      - git
      - code
  memory:
    backend: sqlite
    path: /data/ember.db
  rag:
    enabled: true
    chunkSize: 512
    overlap: 50

# Secrets (use external secrets manager in production)
secrets:
  create: true
  databaseUrl: "sqlite:///data/ember.db"
  jwtSecret: ""  # Will be auto-generated if empty
  # Provider API keys (set these or use external secrets)
  openaiApiKey: ""
  anthropicApiKey: ""
  googleApiKey: ""
  groqApiKey: ""
  deepseekApiKey: ""
  mistralApiKey: ""
  openrouterApiKey: ""
  xaiApiKey: ""

# Persistence
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Health probes
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Enterprise features (optional)
enterprise:
  enabled: false
  sso:
    enabled: false
    provider: ""  # oidc, saml, ldap
    clientId: ""
    clientSecret: ""
    discoveryUrl: ""
  audit:
    enabled: false
    retentionDays: 90
  rbac:
    enabled: false
  teams:
    enabled: false